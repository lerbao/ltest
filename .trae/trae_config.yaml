# Trae自动配置文件
# 当Trae打开项目时，自动执行以下操作

# 自动运行脚本
auto_run:
  - .trae/auto_setup.py

# 问题文档路径
problem_docs:
  - SSH_PUSH_TROUBLESHOOTING.md
  - PROBLEM_SUMMARY.md
  - COMPILATION_GUIDE.md
  - GIT_CONFIG.md

# 自动配置规则
rules:
  - name: "SSH配置"
    trigger:
      - "SSH"
      - "ssh"
      - "代理"
      - "密钥"
    actions:
      - "配置SSH环境变量"
      - "启动SSH代理"
      - "添加SSH密钥"
  
  - name: "编译配置"
    trigger:
      - "编译"
      - "compile"
      - "build"
    actions:
      - "检查编译环境"
      - "执行编译脚本"
  
  - name: "DLL检查"
    trigger:
      - "DLL"
      - "dll"
      - "libmpv"
    actions:
      - "检查DLL文件是否存在"
      - "验证版本兼容性"
  
  - name: "Git配置"
    trigger:
      - "git"
      - "push"
      - "提交"
    actions:
      - "配置SSH协议优先"
      - "设置用户信息"

# 环境变量配置
environment:
  PATH: "G:\\Git\\bin;G:\\Git\\usr\\bin;${PATH}"
  GIT_SSH: "G:\\Git\\usr\\bin\\ssh.exe"
